name: CI
on: pull_request

jobs:
  build:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - uses: pnpm/action-setup@v3
      - uses: actions/checkout@v4

      - name: Install modules
        run: pnpm ci

      - name: Lint
        run: pnpm run lint

      - name: Run tests
        run: pnpm run test

      - name: Build
        run: pnpm run build
